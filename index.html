<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>كأس العالم 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --bg:       #2C3440;
  --bg2:      #323B48;
  --card:     #3A4452;
  --card2:    #404D5C;
  --border:   #4A5668;
  --green:    #4CAF50;
  --green2:   #66BB6A;
  --red:      #EF5350;
  --red2:     #FF7043;
  --cyan:     #26C6DA;
  --cyan2:    #4DD0E1;
  --silver:   #90A4AE;
  --silver2:  #B0BEC5;
  --text:     #ECEFF1;
  --text2:    #CFD8DC;
  --muted:    #78909C;
  --live:     #FF5252;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1B2631 0%, #2C3440 60%, #1a2a20 100%);
  padding: 18px 16px 14px;
  text-align: center;
  border-bottom: 2px solid var(--green);
  position: sticky; top: 0; z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 4px;
}

.trophy { font-size: 28px; }

.header h1 {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--green), var(--cyan), var(--green2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

/* ── TABS ── */
.tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  background: #1B2631;
  border-bottom: 1px solid var(--border);
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex: 1;
  min-width: 72px;
  padding: 12px 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  text-align: center;
  transition: all .2s;
}
.tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── CONTENT ── */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── SECTION ── */
.sec { padding: 14px 12px 0; }

.sec-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.sec-label-text {
  font-size: 11px;
  font-weight: 700;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  white-space: nowrap;
}

.sec-label-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── MATCH CARD ── */
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border-right: 3px solid var(--border);
  position: relative;
  overflow: hidden;
}

.card.finished { border-right-color: var(--silver); }
.card.upcoming { border-right-color: var(--cyan); }
.card.live-now {
  border-right-color: var(--red);
  background: linear-gradient(135deg, #3A2830, #3A4452);
  animation: cardpulse 3s ease-in-out infinite;
}
@keyframes cardpulse {
  0%,100% { box-shadow: 0 0 0 rgba(239,83,80,0); }
  50% { box-shadow: 0 0 12px rgba(239,83,80,0.2); }
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-round {
  font-size: 10px;
  color: var(--muted);
  font-weight: 600;
}

.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: .3px;
}
.badge-live {
  background: rgba(239,83,80,.15);
  color: var(--red);
  border: 1px solid rgba(239,83,80,.4);
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }
.badge-ft {
  background: rgba(144,164,174,.1);
  color: var(--silver);
  border: 1px solid rgba(144,164,174,.2);
}
.badge-ns {
  background: rgba(38,198,218,.1);
  color: var(--cyan);
  border: 1px solid rgba(38,198,218,.25);
}

/* teams row */
.teams-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.team-flag-img {
  width: 38px; height: 38px;
  object-fit: contain;
  border-radius: 4px;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
}

.team-name {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  color: var(--text2);
  line-height: 1.2;
}

/* score */
.score-mid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  min-width: 64px;
}

.score-nums {
  display: flex;
  align-items: center;
  gap: 4px;
}

.score-n {
  font-size: 34px;
  font-weight: 900;
  color: var(--text);
  min-width: 26px;
  text-align: center;
  line-height: 1;
}
.score-n.win { color: var(--green); text-shadow: 0 0 10px rgba(76,175,80,.3); }
.score-sep { font-size: 18px; color: var(--border); font-weight: 300; }
.score-vs { font-size: 12px; color: var(--muted); font-weight: 700; }

.venue-txt {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ── STANDINGS TABLE ── */
.grp-wrap {
  background: var(--card);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.grp-title {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
  background: linear-gradient(90deg, rgba(38,198,218,.1), transparent);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.grp-title::before { content: '⚽'; font-size: 14px; }

table { width: 100%; border-collapse: collapse; font-size: 11px; }
th {
  padding: 7px 4px;
  text-align: center;
  font-weight: 700;
  color: var(--silver);
  background: rgba(0,0,0,.2);
  font-size: 10px;
}
th:first-child { text-align: right; padding-right: 12px; }
td {
  padding: 9px 4px;
  text-align: center;
  border-bottom: 1px solid rgba(74,86,104,.4);
  color: var(--text2);
}
td:first-child { text-align: right; padding-right: 10px; }
tr:last-child td { border-bottom: none; }

.rnk {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px; height: 18px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 5px;
}
.rnk-1 { background: rgba(76,175,80,.2); color: var(--green); }
.rnk-2 { background: rgba(38,198,218,.15); color: var(--cyan); }
.rnk-x { color: var(--muted); }
tr:nth-child(1) td { color: var(--text); }
tr:nth-child(2) td { color: var(--text2); }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  padding: 60px 20px; text-align: center;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: var(--muted); }

/* ── ERROR ── */
.err {
  background: rgba(239,83,80,.08);
  border: 1px solid rgba(239,83,80,.25);
  border-radius: 12px;
  padding: 20px;
  margin: 16px 12px;
  text-align: center;
}
.err p { font-size: 13px; color: var(--silver); margin-top: 6px; line-height: 1.6; }

/* ── REFRESH BTN ── */
.refresh-btn {
  display: block;
  width: calc(100% - 24px);
  margin: 14px 12px;
  padding: 14px;
  background: linear-gradient(135deg, var(--green), #388E3C);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: .5px;
  transition: opacity .2s;
}
.refresh-btn:active { opacity: .85; }

/* ── KNOCKOUT EMPTY ── */
.ko-empty {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  padding: 40px 20px; text-align: center;
}
.ko-empty .ico { font-size: 50px; }
.ko-msg { color: var(--muted); font-size: 13px; line-height: 1.7; }
.ko-msg strong { color: var(--text); display: block; font-size: 15px; margin-bottom: 4px; }
.ko-detail {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  font-size: 12px;
  color: var(--muted);
  line-height: 2;
  text-align: center;
}

.pad { height: 28px; }

/* stage badge */
.stage-pill {
  display: inline-block;
  background: rgba(239,83,80,.12);
  color: var(--red2);
  border: 1px solid rgba(239,83,80,.25);
  border-radius: 8px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 700;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <span class="trophy">🏆</span>
    <h1>كأس العالم 2026</h1>
  </div>
  <div class="header-sub">
    <div class="pulse-dot"></div>
    <span id="update-time">يتم التحديث...</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('matches',this)">📅 المباريات</button>
  <button class="tab" onclick="switchTab('live',this)">🔴 مباشر</button>
  <button class="tab" onclick="switchTab('groups',this)">📊 المجموعات</button>
  <button class="tab" onclick="switchTab('knockout',this)">⚡ الإقصائية</button>
</div>

<!-- MATCHES -->
<div id="tab-matches" class="tab-content active">
  <div id="matches-body">
    <div class="loading"><div class="spinner"></div><p>جارٍ تحميل المباريات...</p></div>
  </div>
  <button class="refresh-btn" onclick="loadMatches()">🔄 تحديث المباريات</button>
  <div class="pad"></div>
</div>

<!-- LIVE -->
<div id="tab-live" class="tab-content">
  <div id="live-body">
    <div class="loading"><div class="spinner"></div><p>يبحث عن مباريات مباشرة...</p></div>
  </div>
  <button class="refresh-btn" onclick="loadLive()">🔴 تحديث المباشر</button>
  <div class="pad"></div>
</div>

<!-- GROUPS -->
<div id="tab-groups" class="tab-content">
  <div id="groups-body">
    <div class="loading"><div class="spinner"></div><p>جارٍ تحميل الترتيب...</p></div>
  </div>
  <button class="refresh-btn" onclick="loadGroups()">🔄 تحديث الترتيب</button>
  <div class="pad"></div>
</div>

<!-- KNOCKOUT -->
<div id="tab-knockout" class="tab-content">
  <div id="knockout-body">
    <div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div>
  </div>
  <button class="refresh-btn" onclick="loadKnockout()">🔄 تحديث</button>
  <div class="pad"></div>
</div>

<script>
const API_KEY = '3143271cf76746b88b9eed20ed94f67c';
const BASE    = 'https://api.football-data.org/v4';
let liveLoaded=false, groupsLoaded=false, knockoutLoaded=false;

/* ── Tabs ── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='live'     && !liveLoaded)     { loadLive();     liveLoaded=true; }
  if(name==='groups'   && !groupsLoaded)   { loadGroups();   groupsLoaded=true; }
  if(name==='knockout' && !knockoutLoaded) { loadKnockout(); knockoutLoaded=true; }
}

/* ── API fetch with proxy fallback ── */
async function apiFetch(path) {
  const url = BASE + path;
  try {
    const r = await fetch(url, { headers:{'X-Auth-Token':API_KEY}, signal:AbortSignal.timeout(6000) });
    if(r.ok) return r.json();
  } catch(e) {}
  try {
    const r = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),
      { headers:{'X-Auth-Token':API_KEY}, signal:AbortSignal.timeout(9000) });
    if(r.ok) return r.json();
  } catch(e) {}
  try {
    const r = await fetch('https://corsproxy.io/?'+encodeURIComponent(url),
      { headers:{'X-Auth-Token':API_KEY}, signal:AbortSignal.timeout(9000) });
    if(r.ok) return r.json();
  } catch(e) {}
  throw new Error('تعذّر الاتصال');
}

/* ── Helpers ── */
function ts() {
  document.getElementById('update-time').textContent =
    'آخر تحديث ' + new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}) +
    ' · 🇨🇦🇺🇸🇲🇽';
}

function matchDate(m) {
  return new Date(m.utcDate).toLocaleDateString('ar-SA',
    {weekday:'short',day:'numeric',month:'short',timeZone:'Asia/Riyadh'});
}

function matchTime(m) {
  return new Date(m.utcDate).toLocaleTimeString('ar-SA',
    {hour:'2-digit',minute:'2-digit',timeZone:'Asia/Riyadh'});
}

function stageAr(s) {
  return {GROUP_STAGE:'دور المجموعات',ROUND_OF_32:'دور الـ32',ROUND_OF_16:'دور الـ16',
    QUARTER_FINALS:'ربع النهائي',SEMI_FINALS:'نصف النهائي',
    THIRD_PLACE:'مباراة الثالث',FINAL:'🏆 النهائي'}[s] || s;
}

function badge(m) {
  const s=m.status;
  if(s==='IN_PLAY'||s==='PAUSED')
    return `<span class="badge badge-live">🔴 ${m.minute?m.minute+"'":'مباشر'}</span>`;
  if(s==='FINISHED')
    return `<span class="badge badge-ft">انتهت</span>`;
  return `<span class="badge badge-ns">${matchTime(m)}</span>`;
}

function crest(team) {
  if(!team.crest) return `<div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:26px">🏳️</div>`;
  return `<img class="team-flag-img" src="${team.crest}" alt="${team.name}" onerror="this.outerHTML='<div style=width:38px;height:38px;font-size:22px;display:flex;align-items:center;justify-content:center>🏳️</div>'">`;
}

function renderCard(m) {
  const done = m.status==='FINISHED';
  const live = m.status==='IN_PLAY'||m.status==='PAUSED';
  const hs = m.score?.fullTime?.home??null;
  const as = m.score?.fullTime?.away??null;
  let hw='',aw='';
  if((done||live)&&hs!==null&&as!==null){if(hs>as)hw=' win';else if(as>hs)aw=' win';}
  const cls = live?'live-now':done?'finished':'upcoming';
  const roundInfo = m.stage==='GROUP_STAGE' && m.matchday
    ? `الجولة ${m.matchday}` : stageAr(m.stage);

  const scoreHtml = (done||live) && hs!==null
    ? `<div class="score-nums">
        <span class="score-n${hw}">${hs}</span>
        <span class="score-sep">—</span>
        <span class="score-n${aw}">${as}</span>
      </div>`
    : `<span class="score-vs">VS</span>`;

  return `
  <div class="card ${cls}">
    <div class="card-top">
      <span class="card-round">${matchDate(m)} · ${roundInfo}</span>
      ${badge(m)}
    </div>
    <div class="teams-row">
      <div class="team">
        ${crest(m.homeTeam)}
        <span class="team-name">${m.homeTeam.shortName||m.homeTeam.name}</span>
      </div>
      <div class="score-mid">${scoreHtml}</div>
      <div class="team">
        ${crest(m.awayTeam)}
        <span class="team-name">${m.awayTeam.shortName||m.awayTeam.name}</span>
      </div>
    </div>
    ${m.venue?`<div class="venue-txt">📍 ${m.venue}</div>`:''}
  </div>`;
}

function showErr(id,msg) {
  document.getElementById(id).innerHTML=
    `<div class="err"><div style="font-size:26px">⚠️</div><p>${msg}</p></div>`;
}

/* ── MATCHES ── */
async function loadMatches() {
  liveLoaded=false; groupsLoaded=false; knockoutLoaded=false;
  document.getElementById('matches-body').innerHTML=
    '<div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div>';
  try {
    const now=new Date();
    const from=new Date(now); from.setDate(from.getDate()-4);
    const to=new Date(now);   to.setDate(to.getDate()+8);
    const fmt=d=>d.toISOString().slice(0,10);
    const data=await apiFetch(`/competitions/WC/matches?dateFrom=${fmt(from)}&dateTo=${fmt(to)}`);
    const matches=data.matches||[];
    if(!matches.length){
      document.getElementById('matches-body').innerHTML=
        '<div class="loading"><p>لا توجد مباريات في هذه الفترة</p></div>'; ts(); return;
    }
    const byDate={};
    matches.forEach(m=>{
      const day=new Date(m.utcDate).toLocaleDateString('ar-SA',
        {weekday:'long',day:'numeric',month:'long',timeZone:'Asia/Riyadh'});
      if(!byDate[day])byDate[day]=[];
      byDate[day].push(m);
    });
    let html='';
    Object.entries(byDate).forEach(([day,ms])=>{
      html+=`<div class="sec"><div class="sec-label">
        <span class="sec-label-text">${day}</span>
        <div class="sec-label-line"></div></div>`;
      ms.forEach(m=>html+=renderCard(m));
      html+='</div>';
    });
    document.getElementById('matches-body').innerHTML=html; ts();
  } catch(e){ showErr('matches-body','فشل تحميل المباريات.<br>'+e.message); }
}

/* ── LIVE ── */
async function loadLive() {
  document.getElementById('live-body').innerHTML=
    '<div class="loading"><div class="spinner"></div><p>يبحث...</p></div>';
  try {
    let data=await apiFetch('/competitions/WC/matches?status=IN_PLAY');
    let live=data.matches||[];
    if(!live.length){
      data=await apiFetch('/competitions/WC/matches?status=PAUSED');
      live=data.matches||[];
    }
    if(!live.length){
      document.getElementById('live-body').innerHTML=
        '<div class="loading"><div style="font-size:44px">📺</div><p style="margin-top:4px">لا توجد مباريات مباشرة الآن</p></div>';
      ts(); return;
    }
    let html='<div class="sec"><div class="sec-label"><span class="sec-label-text">🔴 يلعب الآن</span><div class="sec-label-line"></div></div>';
    live.forEach(m=>html+=renderCard(m));
    html+='</div>';
    document.getElementById('live-body').innerHTML=html; ts();
  } catch(e){ showErr('live-body','فشل التحميل.<br>'+e.message); }
}

/* ── GROUPS ── */
async function loadGroups() {
  document.getElementById('groups-body').innerHTML=
    '<div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div>';
  try {
    const data=await apiFetch('/competitions/WC/standings');
    const standings=data.standings||[];
    if(!standings.length){
      document.getElementById('groups-body').innerHTML=
        '<div class="loading"><p>الترتيب غير متاح بعد — يبدأ بعد الجولة الأولى</p></div>'; return;
    }
    let html='<div style="padding:12px 12px 0">';
    standings.forEach(grp=>{
      const gname=grp.group||grp.stage||'';
      html+=`<div class="grp-wrap"><div class="grp-title">${gname}</div>
      <table><thead><tr>
        <th>الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>نقاط</th>
      </tr></thead><tbody>`;
      grp.table.forEach((row,i)=>{
        const rc=i===0?'rnk-1':i===1?'rnk-2':'rnk-x';
        const flag=row.team.crest
          ?`<img src="${row.team.crest}" style="width:15px;height:15px;object-fit:contain;vertical-align:middle;margin-left:4px" onerror="this.style.display='none'">`:'';
        html+=`<tr><td><span class="rnk ${rc}">${i+1}</span>${flag}${row.team.shortName||row.team.name}</td>
          <td>${row.playedGames}</td><td>${row.won}</td><td>${row.draw}</td><td>${row.lost}</td>
          <td><strong>${row.points}</strong></td></tr>`;
      });
      html+='</tbody></table></div>';
    });
    html+='</div>';
    document.getElementById('groups-body').innerHTML=html; ts();
  } catch(e){ showErr('groups-body','فشل تحميل الترتيب.<br>'+e.message); }
}

/* ── KNOCKOUT ── */
async function loadKnockout() {
  document.getElementById('knockout-body').innerHTML=
    '<div class="loading"><div class="spinner"></div><p>جارٍ التحميل...</p></div>';
  try {
    const stages=['ROUND_OF_32','ROUND_OF_16','QUARTER_FINALS','SEMI_FINALS','THIRD_PLACE','FINAL'];
    const data=await apiFetch('/competitions/WC/matches');
    const all=data.matches||[];
    const ko=all.filter(m=>stages.includes(m.stage));
    if(!ko.length){
      document.getElementById('knockout-body').innerHTML=`
      <div class="ko-empty">
        <div class="ico">⚡</div>
        <div class="ko-msg">
          <strong>الأدوار الإقصائية لم تبدأ بعد</strong>
          ستظهر المباريات هنا تلقائياً بعد انتهاء دور المجموعات
        </div>
        <div class="ko-detail">
          <div>🏟️ النهائي · <strong style="color:#26C6DA">19 يوليو 2026</strong></div>
          <div>📍 MetLife Stadium · نيوجيرسي</div>
          <div>🌎 48 منتخباً · 12 مجموعة</div>
        </div>
      </div>`; ts(); return;
    }
    const byStage={};
    ko.forEach(m=>{ if(!byStage[m.stage])byStage[m.stage]=[]; byStage[m.stage].push(m); });
    let html='';
    stages.forEach(st=>{
      const ms=byStage[st]; if(!ms?.length)return;
      html+=`<div class="sec"><div class="sec-label">
        <span class="stage-pill">${stageAr(st)}</span>
        <div class="sec-label-line"></div></div>`;
      ms.forEach(m=>html+=renderCard(m));
      html+='</div>';
    });
    document.getElementById('knockout-body').innerHTML=html; ts();
  } catch(e){ showErr('knockout-body','فشل التحميل.<br>'+e.message); }
}

/* ── Init ── */
loadMatches();
setInterval(()=>{
  if(document.getElementById('tab-matches').classList.contains('active')) loadMatches();
  if(document.getElementById('tab-live').classList.contains('active'))    loadLive();
},2*60*1000);
</script>
